<!DOCTYPE html>
<html lang= "en">
    <head>
        <meta charset="UTF-8">
        <title>Gym Workout Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
        <h1>Gym Workout Tracker</h1>

        <form id="workoutForm">
            <input type="text" id="exercise" placeholder="Exercise" required>
            <input type="number" id="numSets" placeholder="Number of Sets" required>
            <button type="button" id="createSetInputs">Add Sets</button>
            <div id="setsContainer"></div>
            <button type="submit">Add Workout</button>
        </form>

            <ul id="workoutList"></ul>
        </div>

        <script src="script.js"></script>
    </body>
</html>
